syntax = "proto3";

option go_package = "github.com/eser/acik.io/pkg/proto/hero";

package hero;

message FindOneHeroConditions {
  optional int32 id = 1;
  optional string type = 2;
}

message Hero {
  int32 id = 1;
  string name = 2;
  string type = 3;
}

service HeroService {
  rpc FindOne(FindOneHeroConditions) returns (Hero) {}
}
