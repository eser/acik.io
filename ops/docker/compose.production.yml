name: production

services:
  web:
    tty: true
    stdin_open: true
    restart: unless-stopped
    build:
      context: ../
      dockerfile: ./Dockerfile
      target: runner-production
    environment:
      PORT: 8080
      POSTGRES_CONNSTR: postgres://postgres:s3cr3t@postgresql:5432/postgres
    networks:
      - acik-io-network
    ports:
      - 8080:8080
    depends_on:
      - postgres

networks:
  acik-io-network:
    driver: bridge
